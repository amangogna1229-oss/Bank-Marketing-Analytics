name: Repository Validation

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show Current Directory
        run: pwd

      - name: Show All Files
        run: |
          echo "Current Directory:"
          pwd

          echo "------------------------"

          echo "Files:"
          ls -la

          echo "------------------------"

          echo "Recursive:"
          find .

      - name: Check README
        run: |
          if [ -f README.md ]; then
            echo "✅ README Found"
          else
            echo "❌ README Missing"
            exit 1
          fi
